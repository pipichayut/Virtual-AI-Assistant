<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant · Executive Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #08090C;
    --surface: #11141B;
    --surface-2: #181C25;
    --surface-3: #20242F;
    --border: rgba(255, 255, 255, 0.06);
    --border-2: rgba(255, 255, 255, 0.10);
    --text-1: #F5F5F4;
    --text-2: rgba(245, 245, 244, 0.62);
    --text-3: rgba(245, 245, 244, 0.38);
    --red: #FF5470;
    --red-dim: rgba(255, 84, 112, 0.15);
    --red-2: rgba(255, 84, 112, 0.35);
    --mint: #34D399;
    --mint-dim: rgba(52, 211, 153, 0.15);
    --amber: #FBBF24;
    --amber-dim: rgba(251, 191, 36, 0.15);
    --cyan: #38BDF8;
    --display: 'Anton', sans-serif;
    --sans: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text-1); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { background-image: radial-gradient(1200px 600px at 50% -200px, rgba(255, 84, 112, 0.04), transparent 70%); }

  .page { max-width: 1320px; margin: 0 auto; padding: 32px 40px 56px; }

  /* ========== TOP BAR ========== */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; box-shadow: 0 0 0 3px rgba(255, 84, 112, 0.18); animation: pulse 2.5s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(255, 84, 112, 0.18); }
    50% { box-shadow: 0 0 0 6px rgba(255, 84, 112, 0.05); }
  }
  .brand-text { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-2); font-weight: 500; }
  .brand-text span { color: var(--text-1); }
  .topbar-meta { display: flex; gap: 28px; align-items: center; font-family: var(--mono); font-size: 11px; }
  .topbar-meta > div:not(.refresh-wrap) { color: var(--text-3); }
  .topbar-meta > div:not(.refresh-wrap) strong { color: var(--text-1); font-weight: 500; margin-left: 8px; }

  /* ========== REFRESH ========== */
  .refresh-wrap { display: flex; align-items: center; gap: 10px; padding-left: 16px; border-left: 1px solid var(--border); }
  .updated-text { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; }
  .refresh-btn {
    background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2);
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s; font-family: var(--sans); padding: 0;
  }
  .refresh-btn:hover { color: var(--text-1); border-color: var(--text-3); background: var(--surface-3); }
  .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
  .refresh-btn .icon { display: inline-block; line-height: 1; }
  .refresh-btn.spinning .icon { animation: spin 0.9s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ========== STATUS BANNER ========== */
  .status-banner { display: flex; align-items: center; gap: 16px; margin: 20px 0 28px; padding: 14px 20px; background: var(--red-dim); border: 1px solid var(--red-2); border-radius: 6px; }
  .status-banner.hidden { display: none; }
  .status-banner .status-icon { width: 28px; height: 28px; background: var(--red); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 18px; flex-shrink: 0; }
  .status-banner .status-text { flex: 1; font-size: 13px; color: var(--text-1); }
  .status-banner .status-text strong { color: var(--red); font-weight: 600; }
  .status-banner .status-meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); white-space: nowrap; }

  /* ========== ERROR BANNER ========== */
  .err-banner { display: none; margin: 20px 0; padding: 14px 20px; background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 6px; font-family: var(--mono); font-size: 12px; color: var(--amber); }
  .err-banner.show { display: block; }

  /* ========== HERO KPIs ========== */
  .hero-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; }
  .kpi-card .kpi-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
  .kpi-card .kpi-value { font-family: var(--display); font-size: 64px; line-height: 0.95; letter-spacing: 0.01em; }
  .kpi-card .kpi-value sup { font-size: 26px; opacity: 0.6; vertical-align: top; margin-left: 2px; }
  .kpi-card .kpi-value.red { color: var(--red); }
  .kpi-card .kpi-value.mint { color: var(--mint); }
  .kpi-card .kpi-value.amber { color: var(--amber); }
  .kpi-card .kpi-meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); margin-top: 12px; display: flex; align-items: center; gap: 6px; }
  .kpi-card .kpi-meta .arrow { font-family: sans-serif; }
  .kpi-card .kpi-meta.up { color: var(--mint); }
  .kpi-card .kpi-meta.down { color: var(--red); }
  .kpi-card .kpi-meta.flat { color: var(--amber); }

  /* ========== SECTION ========== */
  .sec { margin-top: 36px; }
  .sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sec-num { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.15em; }
  .sec-title { font-family: var(--display); font-size: 28px; letter-spacing: 0.02em; color: var(--text-1); flex: 1; margin: 0 16px; text-transform: uppercase; }
  .sec-desc { font-family: var(--mono); font-size: 11px; color: var(--text-2); text-align: right; max-width: 360px; }

  /* ========== CARD ========== */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .card-title { font-family: var(--mono); font-size: 11px; color: var(--text-2); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
  .card-meta { font-family: var(--mono); font-size: 10px; color: var(--text-3); }

  /* ========== TOOL GRID ========== */
  .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .tool-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr 110px 70px; gap: 14px; align-items: center; transition: border-color 0.2s; }
  .tool-row:hover { border-color: var(--border-2); }
  .tool-row.crit { border-left: 2px solid var(--red); }
  .tool-row.warn { border-left: 2px solid var(--amber); }
  .tool-row.ok { border-left: 2px solid var(--mint); }
  .tool-row.idle { border-left: 2px solid var(--text-3); }
  .tool-info .tool-name { font-family: var(--mono); font-size: 12px; color: var(--text-1); font-weight: 500; }
  .tool-info .tool-vol { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-top: 3px; }
  .tool-stats { display: flex; gap: 16px; }
  .tool-stat { display: flex; flex-direction: column; }
  .tool-stat .lbl { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .tool-stat .val { font-family: var(--display); font-size: 24px; line-height: 1; letter-spacing: 0.02em; margin-top: 4px; }
  .tool-stat .val.red { color: var(--red); }
  .tool-stat .val.amber { color: var(--amber); }
  .tool-stat .val.mint { color: var(--mint); }
  .tool-stat .val.text-1 { color: var(--text-1); }
  .tool-spark { height: 38px; }
  .tool-pill { font-family: var(--mono); font-size: 9px; padding: 4px 7px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; text-align: center; font-weight: 500; }
  .pill-crit { background: var(--red-dim); color: var(--red); }
  .pill-warn { background: var(--amber-dim); color: var(--amber); }
  .pill-ok { background: var(--mint-dim); color: var(--mint); }
  .pill-idle { background: rgba(255,255,255,0.06); color: var(--text-3); }

  /* ========== CHART HOLDERS ========== */
  .chart-wrap { position: relative; width: 100%; }

  /* ========== INCIDENTS ROW ========== */
  .row-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; }
  .incident-card { background: var(--surface); border: 1px solid var(--red-2); border-radius: 8px; padding: 20px 24px; position: relative; overflow: hidden; }
  .incident-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--red); }
  .incident-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--red); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .incident-tag::before { content: '●'; font-size: 12px; }
  .incident-title { font-family: var(--display); font-size: 26px; letter-spacing: 0.02em; line-height: 1.05; text-transform: uppercase; }
  .incident-title em { color: var(--red); font-style: normal; }
  .incident-stats { display: flex; gap: 24px; margin: 16px 0 6px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .incident-stat .lbl { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; }
  .incident-stat .val { font-family: var(--display); font-size: 30px; color: var(--text-1); margin-top: 3px; letter-spacing: 0.02em; }
  .incident-stat .val.red { color: var(--red); }

  /* ========== LANGUAGE GAP ========== */
  .lang-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }
  .lang-bars { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .lang-bar-row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; align-items: center; }
  .lang-bar-row .tool-lbl { font-family: var(--mono); font-size: 10px; color: var(--text-2); text-align: right; }
  .lang-bar-stack { display: flex; flex-direction: column; gap: 3px; }
  .lang-bar { height: 12px; background: rgba(255,255,255,0.04); border-radius: 2px; position: relative; overflow: hidden; }
  .lang-bar .fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .lang-bar .fill.en { background: var(--cyan); }
  .lang-bar .fill.th { background: var(--red); }
  .lang-bar .pct-label { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 9px; color: var(--text-1); font-weight: 500; }

  /* ========== RECS ========== */
  .recs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 18px; position: relative; }
  .rec-card .rec-num { font-family: var(--display); font-size: 38px; line-height: 1; color: var(--text-3); position: absolute; top: 14px; right: 16px; opacity: 0.4; }
  .rec-card .rec-tier { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .rec-card .rec-tier.p0 { color: var(--red); }
  .rec-card .rec-tier.p1 { color: var(--amber); }
  .rec-card .rec-tier.p2 { color: var(--cyan); }
  .rec-card h4 { font-family: var(--sans); font-weight: 500; font-size: 13px; line-height: 1.35; color: var(--text-1); margin: 0 36px 14px 0; }
  .rec-card .rec-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .rec-card .rec-tag { font-family: var(--mono); font-size: 9px; padding: 3px 7px; background: var(--surface-3); border-radius: 4px; color: var(--text-2); letter-spacing: 0.04em; }
  .rec-card .rec-tag strong { color: var(--text-1); font-weight: 500; }

  /* ========== FOOTER ========== */
  footer { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; }

  /* ========== LOADING ========== */
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
  .loading-overlay.hide { opacity: 0; pointer-events: none; }
  .loading-overlay .spinner { width: 32px; height: 32px; border: 2px solid var(--border-2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.9s linear infinite; }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 1100px) {
    .page { padding: 24px 20px; }
    .hero-kpis { grid-template-columns: repeat(2, 1fr); }
    .tool-grid { grid-template-columns: 1fr; }
    .tool-row { grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-2 { grid-template-columns: 1fr; }
    .recs { grid-template-columns: repeat(2, 1fr); }
    .topbar { flex-direction: column; align-items: flex-start; gap: 12px; }
    .topbar-meta { flex-wrap: wrap; gap: 16px; }
    .refresh-wrap { padding-left: 0; border-left: none; }
    .sec-head { flex-direction: column; align-items: flex-start; gap: 6px; }
    .sec-title { margin: 0; }
    .sec-desc { text-align: left; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="page">

  <!-- ========== TOP BAR ========== -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-text">AI ASSISTANT · <span>EXECUTIVE BRIEF</span></div>
    </div>
    <div class="topbar-meta">
      <div>WINDOW<strong id="metaWindow">—</strong></div>
      <div>RANGE<strong id="metaRange">—</strong></div>
      <div>TZ<strong id="metaTz">—</strong></div>
      <div class="refresh-wrap">
        <span class="updated-text" id="lastUpdated">—</span>
        <button class="refresh-btn" id="refreshBtn" title="Refresh data" aria-label="Refresh data"><span class="icon">↻</span></button>
      </div>
    </div>
  </div>

  <!-- ========== ERROR BANNER ========== -->
  <div class="err-banner" id="errBanner"></div>

  <!-- ========== STATUS BANNER ========== -->
  <div class="status-banner hidden" id="statusBanner">
    <div class="status-icon" id="statusIcon">!</div>
    <div class="status-text" id="statusText"></div>
    <div class="status-meta" id="statusMeta"></div>
  </div>

  <!-- ========== HERO KPIs ========== -->
  <div class="hero-kpis" id="kpiGrid"></div>

  <!-- ========== SEC 01 — LATENCY ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">01</div>
      <h2 class="sec-title">Average latency · 14 days</h2>
      <div class="sec-desc" id="latencyDesc">—</div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title" id="latencyCardTitle">—</div>
        <div class="card-meta" id="latencyCardMeta">—</div>
      </div>
      <div class="chart-wrap" style="height: 240px;">
        <canvas id="latencyChart" role="img" aria-label="Average latency per day over 14 days"></canvas>
      </div>
    </div>
  </section>

  <!-- ========== SEC 02 — DAILY ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">02</div>
      <h2 class="sec-title">Daily volume × quality</h2>
      <div class="sec-desc" id="dailyDesc">—</div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title" id="dailyCardTitle">—</div>
        <div class="card-meta">14d</div>
      </div>
      <div class="chart-wrap" style="height: 240px;">
        <canvas id="dailyChart" role="img" aria-label="Daily traces and unresolved rate over 14 days"></canvas>
      </div>
    </div>
  </section>

  <!-- ========== SEC 03 — TOOLS ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">03</div>
      <h2 class="sec-title">Tool-level health</h2>
      <div class="sec-desc" id="toolsDesc">—</div>
    </div>
    <div class="tool-grid" id="toolGrid"></div>
  </section>

  <!-- ========== SEC 04 — INCIDENTS ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">04</div>
      <h2 class="sec-title">Critical patterns</h2>
      <div class="sec-desc" id="incidentDesc">—</div>
    </div>
    <div class="row-2">

      <div class="incident-card">
        <div class="incident-tag" id="incidentTag">—</div>
        <h3 class="incident-title" id="incidentTitle">—</h3>
        <div class="incident-stats" id="incidentStats"></div>
        <div class="chart-wrap" style="height: 180px; margin-top: 6px;">
          <canvas id="promoChart" role="img" aria-label="Promo failure rate timeline"></canvas>
        </div>
      </div>

      <div class="lang-card">
        <div class="card-head">
          <div class="card-title" id="langCardTitle">—</div>
          <div class="card-meta" id="langCardMeta">—</div>
        </div>
        <div class="lang-bars" id="langBars"></div>
      </div>

    </div>
  </section>

  <!-- ========== SEC 05 — LOST DEMAND ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">05</div>
      <h2 class="sec-title">Lost demand</h2>
      <div class="sec-desc" id="brandsDesc">—</div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title" id="brandsCardTitle">—</div>
        <div class="card-meta" id="brandsCardMeta">—</div>
      </div>
      <div class="chart-wrap" style="height: 220px;">
        <canvas id="brandChart" role="img" aria-label="Failed product searches by brand"></canvas>
      </div>
    </div>
  </section>

  <!-- ========== SEC 06 — RECS ========== -->
  <section class="sec">
    <div class="sec-head">
      <div class="sec-num">06</div>
      <h2 class="sec-title">Action queue</h2>
      <div class="sec-desc" id="recsDesc">—</div>
    </div>
    <div class="recs" id="recsGrid"></div>
  </section>

  <footer>
    <span id="footerSource">—</span>
    <span id="footerRange">—</span>
    <span id="footerLabel">—</span>
  </footer>

</div>

<script>
  // ============================================================
  // CONFIG — edit this block to wire up your data + tune behavior
  // ============================================================
  const CONFIG = {
    // Your Google Sheet published as CSV (File → Share → Publish to web → CSV)
    DATA_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGMFK-952N9nSsKiOEJ4JvnuKtdUoe3a7LzqG87yNbmdIcwS_gllZmA0NKsMDei5EGaVSV0qC0moLO/pub?output=csv',

    // Date window to analyze. mode: 'rolling' uses last N days; 'fixed' uses an exact range.
    WINDOW: { mode: 'rolling', days: 14 },
    // WINDOW: { mode: 'fixed', start: '2026-04-16', end: '2026-04-29' },

    TIMEZONE_LABEL: 'BKK',

    FOOTER: {
      source: 'GOOGLE SHEET · LIVE',
      label: 'EXECUTIVE BRIEF'
    },

    // The "Promo tool broke" card. Set tool to a tool that exists in your data,
    // and break_date to when the regression began. Pre/post stats auto-compute.
    INCIDENT: {
      enabled: true,
      tool: 'check_promotions',
      break_date: '2026-04-23',
      title_html: 'Promo tool <em>broke Apr 23</em>'
    },

    // Optional override for the red status banner. Set to null to auto-detect from data.
    STATUS_BANNER_OVERRIDE: null,
    // STATUS_BANNER_OVERRIDE: { title: '1 ACTIVE INCIDENT', description: '...', tag: 'P0' },

    // Section descriptions (editorial, not computed)
    DESCRIPTIONS: {
      latency: 'Daily avg response time · target ≤ 8s',
      daily: 'Volume × resolution over window',
      incident: 'Active outage + structural language gap',
      brands: 'Buyer intent the catalog missed · forward to merchandising',
      recommendations: 'Ranked by ROI'
    },

    // Recommendations — edit freely. These are editorial and not derived from data.
    RECOMMENDATIONS: [
      { rank: 1, tier: 'p0', tier_label: 'P0 · Today',       title: 'Fix promo tool data feed',                effort: 'S',   impact: 'High' },
      { rank: 2, tier: 'p0', tier_label: 'P0 · This sprint', title: 'Order lookup by email + name',            effort: 'M',   impact: 'Very high' },
      { rank: 3, tier: 'p1', tier_label: 'P1 · 30d',         title: 'Thai language QA pass',                   effort: 'M',   impact: 'High' },
      { rank: 4, tier: 'p1', tier_label: 'P1 · 60d',         title: 'Restock + branch stock + agent handoff',  effort: 'M-L', impact: 'Med-high' },
      { rank: 5, tier: 'p2', tier_label: 'P2 · Always-on',   title: 'Tool-fail alerting + lost-demand digest', effort: 'S',   impact: 'Compounding' }
    ],

    // Brand keywords scanned in failed product searches (Tool Input + Question)
    BRANDS: ['Nike','New Balance','Adidas','ASICS','Hoka','Crocs','Mizuno','Jordan','Puma','Skechers','Under Armour','On Running','Brooks','Salomon','Reebok','Vans','Converse','Fila'],

    // Fail-detection rules — applied to each row to classify pass/fail.
    // Add or remove patterns to tune what counts as a failure.
    FAIL_OUTPUT_CONTAINS: ['no products found'],
    FAIL_RESPONSE_PATTERNS: [
      /no products?\s+found/i,
      /i don'?t have (specific|the)/i,
      /unable to (help|find|provide|locate)/i,
      /ไม่พบสินค้า/,
      /ไม่ได้ระบุ/,
      /แนะนำให้ติดต่อ/,
      /ขออภัย.*ไม่.*(พบ|สามารถ|มี)/
    ],

    // Idle threshold: tools with fewer than this many traces are marked IDLE regardless of fail rate
    IDLE_VOL_THRESHOLD: 30,

    // Target avg latency in seconds — drives the dashed line + amber highlights on the latency chart
    LATENCY_TARGET: 8
  };

  // ============================================================
  // CHART DEFAULTS
  // ============================================================
  Chart.defaults.font.family = "'Geist', system-ui, sans-serif";
  Chart.defaults.font.size = 10;
  Chart.defaults.color = 'rgba(245, 245, 244, 0.55)';
  Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.06)';

  const C = {
    text1: '#F5F5F4', text2: 'rgba(245, 245, 244, 0.62)', text3: 'rgba(245, 245, 244, 0.38)',
    red: '#FF5470', mint: '#34D399', amber: '#FBBF24', cyan: '#38BDF8',
    grid: 'rgba(255, 255, 255, 0.05)', surface: '#11141B'
  };

  let charts = {};

  // ============================================================
  // CSV FETCH + PARSE
  // ============================================================
  async function loadData() {
    if (CONFIG.DATA_URL.startsWith('PASTE_')) {
      throw new Error('DATA_URL not set. Open index.html and paste your published-CSV URL.');
    }
    const url = `${CONFIG.DATA_URL}${CONFIG.DATA_URL.includes('?') ? '&' : '?'}_=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store', redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status} — could not load CSV`);
    const text = await res.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    if (parsed.errors && parsed.errors.length) {
      console.warn('CSV parse warnings:', parsed.errors.slice(0, 5));
    }
    if (!parsed.data || !parsed.data.length) throw new Error('Sheet is empty or unreadable');
    return analyze(parsed.data);
  }

  // ============================================================
  // ANALYSIS — turns raw trace rows into the dashboard data shape
  // ============================================================
  const THAI_RE = /[\u0E00-\u0E7F]/;

  function detectLang(s) {
    return s && THAI_RE.test(s) ? 'th' : 'en';
  }

  function isFailed(r) {
    const out = String(r['Tool Output'] || '').toLowerCase();
    const resp = String(r['Agent Response'] || '').toLowerCase();
    for (const term of CONFIG.FAIL_OUTPUT_CONTAINS) {
      if (out.includes(term.toLowerCase())) return true;
    }
    if (!resp.trim()) return true;
    return CONFIG.FAIL_RESPONSE_PATTERNS.some(p => p.test(resp));
  }

  function extractBrand(text) {
    if (!text) return null;
    if (/sketcher|skechers/i.test(text)) return 'Skechers';
    for (const b of CONFIG.BRANDS) {
      const re = new RegExp(b.replace(/\s+/g, '\\s*'), 'i');
      if (re.test(text)) return b;
    }
    return null;
  }

  function parseTs(ts) {
    if (!ts) return null;
    // Google often returns "2026-04-16 0:23:02" — normalize to ISO
    const m = String(ts).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
    if (!m) {
      const d = new Date(ts);
      return isNaN(d) ? null : d;
    }
    const [, y, mo, d, h, mi, s] = m;
    return new Date(Date.UTC(+y, +mo - 1, +d, +h, +mi, +(s || 0)));
  }

  function isoDate(d) {
    return d.toISOString().slice(0, 10);
  }

  function annotate(r) {
    const ts = parseTs(r['Timestamp (BKK)'] || r['Timestamp'] || r['timestamp']);
    return {
      _raw: r,
      _ts: ts,
      _date: ts ? isoDate(ts) : null,
      _tool: ((r['Tool Used'] || '').trim() || '(direct response)'),
      _time: parseFloat(r['Time Taken (s)']) || 0,
      _lang: detectLang(r['Question']),
      _failed: isFailed(r),
      _question: r['Question'] || '',
      _toolInput: r['Tool Input'] || ''
    };
  }

  function determineWindow(annotated) {
    const dates = annotated.map(r => r._date).filter(Boolean).sort();
    if (!dates.length) return null;
    let start, end;
    if (CONFIG.WINDOW.mode === 'fixed') {
      start = CONFIG.WINDOW.start;
      end = CONFIG.WINDOW.end;
    } else {
      end = dates[dates.length - 1];
      const endD = new Date(end + 'T00:00:00Z');
      const startD = new Date(endD);
      startD.setUTCDate(startD.getUTCDate() - (CONFIG.WINDOW.days - 1));
      start = isoDate(startD);
    }
    const dateList = [];
    const cur = new Date(start + 'T00:00:00Z');
    const endDate = new Date(end + 'T00:00:00Z');
    while (cur <= endDate) {
      dateList.push(isoDate(cur));
      cur.setUTCDate(cur.getUTCDate() + 1);
    }
    return { start, end, dateList };
  }

  function fmtRange(start, end) {
    const a = new Date(start + 'T00:00:00Z');
    const b = new Date(end + 'T00:00:00Z');
    const month = b.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' }).toUpperCase();
    return `${a.getUTCDate()} → ${b.getUTCDate()} ${month} ${b.getUTCFullYear()}`;
  }

  function fmtShort(dateStr) {
    const d = new Date(dateStr + 'T00:00:00Z');
    return `${d.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' })} ${d.getUTCDate()}`;
  }

  function buildIncident(toolMap, win) {
    if (!CONFIG.INCIDENT.enabled || !toolMap[CONFIG.INCIDENT.tool]) {
      return { section_desc: CONFIG.DESCRIPTIONS.incident, tag: '', title_html: '<em>No incident configured</em>', stats: [], chart_data: win.dateList.map(_ => 0), highlight_index: -1 };
    }
    const data = toolMap[CONFIG.INCIDENT.tool];
    const breakDate = CONFIG.INCIDENT.break_date;
    const hi = win.dateList.indexOf(breakDate);
    const preRows = data.rows.filter(r => r._date < breakDate);
    const postRows = data.rows.filter(r => r._date >= breakDate);
    const preFails = preRows.filter(r => r._failed).length;
    const postFails = postRows.filter(r => r._failed).length;
    const preFailPct = preRows.length ? Math.round(preFails / preRows.length * 100) : 0;
    const postFailPct = postRows.length ? Math.round(postFails / postRows.length * 100) : 0;
    let daysDown = 0;
    win.dateList.forEach(d => {
      if (d >= breakDate) {
        const dd = data.byDate[d];
        if (dd && dd.count && (dd.fails / dd.count) > 0.8) daysDown++;
      }
    });
    const chartData = win.dateList.map(d => {
      const dd = data.byDate[d];
      return dd && dd.count ? +(dd.fails / dd.count * 100).toFixed(1) : 0;
    });
    return {
      section_desc: CONFIG.DESCRIPTIONS.incident,
      tag: 'Active outage',
      title_html: CONFIG.INCIDENT.title_html,
      stats: [
        { lbl: `Pre-${fmtShort(breakDate)}`,  val: String(preFailPct),  unit: '%', color: 'default' },
        { lbl: `Post-${fmtShort(breakDate)}`, val: String(postFailPct), unit: '%', color: 'red' },
        { lbl: 'Days down',     val: String(daysDown),     unit: '', color: 'red' },
        { lbl: 'Lost queries',  val: '~' + postFails,      unit: '', color: 'red' }
      ],
      chart_data: chartData,
      highlight_index: hi >= 0 ? hi : -1
    };
  }

  function analyze(rawRows) {
    const annotated = rawRows.map(annotate).filter(r => r._ts);
    if (!annotated.length) throw new Error('No rows with a valid "Timestamp (BKK)" column');

    const win = determineWindow(annotated);
    if (!win) throw new Error('Could not determine date window');

    const inWin = annotated.filter(r => r._date >= win.start && r._date <= win.end);
    if (!inWin.length) throw new Error(`No rows fall inside the window ${win.start} → ${win.end}`);

    // Daily aggregation (counts, fails, and total time → avg latency per day)
    const dailyByDate = {};
    win.dateList.forEach(d => { dailyByDate[d] = { count: 0, fails: 0, time: 0 }; });
    inWin.forEach(r => {
      if (dailyByDate[r._date]) {
        dailyByDate[r._date].count++;
        if (r._failed) dailyByDate[r._date].fails++;
        dailyByDate[r._date].time += r._time;
      }
    });

    // Tool aggregation
    const toolMap = {};
    inWin.forEach(r => {
      if (!toolMap[r._tool]) {
        toolMap[r._tool] = { rows: [], byDate: {} };
        win.dateList.forEach(d => { toolMap[r._tool].byDate[d] = { count: 0, fails: 0 }; });
      }
      toolMap[r._tool].rows.push(r);
      if (toolMap[r._tool].byDate[r._date]) {
        toolMap[r._tool].byDate[r._date].count++;
        if (r._failed) toolMap[r._tool].byDate[r._date].fails++;
      }
    });

    const totalCount = inWin.length;
    const totalFails = inWin.filter(r => r._failed).length;
    const sumTime = inWin.reduce((s, r) => s + r._time, 0);
    const avgLatency = sumTime / totalCount;
    const pctUnder15 = Math.round(inWin.filter(r => r._time < 15).length / totalCount * 100);

    // Build tool list, sorted by volume desc
    const tools = Object.entries(toolMap).map(([name, data]) => {
      const vol = data.rows.length;
      const fails = data.rows.filter(r => r._failed).length;
      const failPct = vol ? fails / vol * 100 : 0;
      const avgT = vol ? data.rows.reduce((s, r) => s + r._time, 0) / vol : 0;
      const dailyFail = win.dateList.map(d => {
        const dd = data.byDate[d];
        return dd && dd.count ? +(dd.fails / dd.count * 100).toFixed(1) : 0;
      });
      let status, pill;
      if (vol < CONFIG.IDLE_VOL_THRESHOLD) { status = 'idle'; pill = 'IDLE'; }
      else if (failPct >= 80) { status = 'crit'; pill = 'BROKEN'; }
      else if (failPct >= 50) { status = 'crit'; pill = 'CRITICAL'; }
      else if (failPct >= 25) { status = 'warn'; pill = 'WARN'; }
      else { status = 'ok'; pill = 'HEALTHY'; }
      return {
        name, vol,
        share: +(vol / totalCount * 100).toFixed(1),
        fail: +failPct.toFixed(1),
        time: +avgT.toFixed(1),
        status, pill,
        daily_fail: dailyFail
      };
    }).sort((a, b) => b.vol - a.vol);

    // Language gap
    let enT = 0, enF = 0, thT = 0, thF = 0;
    inWin.forEach(r => {
      if (r._lang === 'th') { thT++; if (r._failed) thF++; }
      else { enT++; if (r._failed) enF++; }
    });
    const enRate = enT ? enF / enT * 100 : 0;
    const thRate = thT ? thF / thT * 100 : 0;
    const langGap = Math.round(thRate - enRate);

    // Per-tool language
    const langByTool = {};
    inWin.forEach(r => {
      if (!langByTool[r._tool]) langByTool[r._tool] = { en_t:0,en_f:0,th_t:0,th_f:0 };
      const s = langByTool[r._tool];
      if (r._lang === 'th') { s.th_t++; if (r._failed) s.th_f++; }
      else { s.en_t++; if (r._failed) s.en_f++; }
    });

    // Brands
    const brandCounts = {};
    inWin.forEach(r => {
      if (r._tool === 'product_recommendation' && r._failed) {
        const brand = extractBrand((r._toolInput + ' ' + r._question));
        if (brand) brandCounts[brand] = (brandCounts[brand] || 0) + 1;
      }
    });
    const brandTotal = Object.values(brandCounts).reduce((a, b) => a + b, 0);

    // Status banner — auto-detect or override
    let statusBanner;
    if (CONFIG.STATUS_BANNER_OVERRIDE) {
      statusBanner = Object.assign({ show: true, icon: '!' }, CONFIG.STATUS_BANNER_OVERRIDE);
    } else {
      const broken = tools.filter(t => t.status === 'crit' && t.fail >= 80 && t.vol >= CONFIG.IDLE_VOL_THRESHOLD);
      if (broken.length) {
        const lead = broken[0];
        statusBanner = {
          show: true, icon: '!',
          title: `${broken.length} ACTIVE INCIDENT${broken.length > 1 ? 'S' : ''}`,
          description: `${lead.name} failure rate at ${Math.round(lead.fail)}%${broken.length > 1 ? ` · +${broken.length - 1} more critical` : ''}`,
          tag: 'P0 · ENGINEERING ON-CALL'
        };
      } else {
        statusBanner = { show: false };
      }
    }

    const critCount = tools.filter(t => t.status === 'crit').length;
    const okCount = tools.filter(t => t.status === 'ok').length;

    return {
      meta: {
        window: `${win.dateList.length}D`,
        range: fmtRange(win.start, win.end),
        tz: CONFIG.TIMEZONE_LABEL,
        footer_source: CONFIG.FOOTER.source,
        footer_range: `${CONFIG.TIMEZONE_LABEL} ${win.start} → ${win.end}`,
        footer_label: CONFIG.FOOTER.label
      },
      status_banner: statusBanner,
      kpis: [
        {
          label: 'Total traces',
          value: totalCount.toLocaleString(),
          unit: '', color: 'default',
          meta: `${win.dateList.length}d window`,
          meta_arrow: '', meta_trend: 'flat'
        },
        {
          label: 'Avg latency',
          value: avgLatency.toFixed(1), unit: 's',
          color: avgLatency < 10 ? 'mint' : avgLatency < 20 ? 'amber' : 'red',
          meta: `${pctUnder15}% under 15s`,
          meta_arrow: '', meta_trend: avgLatency < 10 ? 'up' : 'flat'
        },
        {
          label: 'Unresolved rate',
          value: Math.round(totalFails / totalCount * 100).toString(), unit: '%',
          color: 'red',
          meta: 'across all tools',
          meta_arrow: '', meta_trend: 'down'
        },
        {
          label: 'TH ↔ EN gap',
          value: (langGap >= 0 ? '+' : '') + langGap, unit: 'pt',
          color: 'amber',
          meta: `${Math.round(thRate)}% TH · ${Math.round(enRate)}% EN fail`,
          meta_arrow: '', meta_trend: 'flat'
        }
      ],
      latency: {
        section_desc: CONFIG.DESCRIPTIONS.latency,
        card_title: `Avg latency by day (seconds) · target line at ${CONFIG.LATENCY_TARGET}s`,
        card_meta: `${win.dateList.length}d · ${CONFIG.TIMEZONE_LABEL}`,
        target: CONFIG.LATENCY_TARGET,
        dates: win.dateList.map(d => d.slice(-2)),
        values: win.dateList.map(d => dailyByDate[d].count ? +(dailyByDate[d].time / dailyByDate[d].count).toFixed(1) : 0)
      },
      daily: {
        section_desc: CONFIG.DESCRIPTIONS.daily,
        card_title: 'Traces (bars) · unresolved % (line)',
        dates: win.dateList.map(d => d.slice(-2)),
        volume: win.dateList.map(d => dailyByDate[d].count),
        fail_pct: win.dateList.map(d => dailyByDate[d].count ? +(dailyByDate[d].fails / dailyByDate[d].count * 100).toFixed(1) : 0)
      },
      tools: {
        section_desc: `${tools.length} tools · ${critCount} critical · ${okCount} healthy`,
        items: tools
      },
      incident: buildIncident(toolMap, win),
      languages: {
        card_title: 'Language gap by tool · fail %',
        card_meta: 'EN · TH',
        rows: tools.slice(0, 6).map(t => {
          const s = langByTool[t.name] || { en_t:0,en_f:0,th_t:0,th_f:0 };
          return {
            tool: t.name,
            en: s.en_t ? +(s.en_f / s.en_t * 100).toFixed(1) : 0,
            th: s.th_t ? +(s.th_f / s.th_t * 100).toFixed(1) : 0
          };
        })
      },
      brands: {
        section_desc: CONFIG.DESCRIPTIONS.brands,
        card_title: `Failed product searches by brand · ${brandTotal} total`,
        card_meta: 'Top 10',
        items: Object.entries(brandCounts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10)
          .map(([name, value]) => ({ name, value }))
      },
      recommendations: {
        section_desc: CONFIG.DESCRIPTIONS.recommendations,
        items: CONFIG.RECOMMENDATIONS
      }
    };
  }

  function showError(msg) {
    const el = document.getElementById('errBanner');
    el.textContent = `⚠ ${msg}`;
    el.classList.add('show');
  }
  function clearError() {
    document.getElementById('errBanner').classList.remove('show');
  }

  // ============================================================
  // RENDERERS
  // ============================================================
  function renderMeta(meta) {
    document.getElementById('metaWindow').textContent = meta.window || '—';
    document.getElementById('metaRange').textContent = meta.range || '—';
    document.getElementById('metaTz').textContent = meta.tz || '—';
    document.getElementById('footerSource').textContent = `SOURCE · ${meta.footer_source || ''}`;
    document.getElementById('footerRange').textContent = meta.footer_range || '';
    document.getElementById('footerLabel').textContent = meta.footer_label || '';
  }

  function renderStatusBanner(sb) {
    const el = document.getElementById('statusBanner');
    if (!sb || !sb.show) { el.classList.add('hidden'); return; }
    el.classList.remove('hidden');
    document.getElementById('statusIcon').textContent = sb.icon || '!';
    document.getElementById('statusText').innerHTML =
      `<strong>${escapeHtml(sb.title || '')}</strong> · ${escapeHtml(sb.description || '')}`;
    document.getElementById('statusMeta').textContent = sb.tag || '';
  }

  function renderKpis(kpis) {
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = '';
    kpis.forEach(k => {
      const colorClass = ['red','mint','amber'].includes(k.color) ? k.color : '';
      const trendClass = ['up','down','flat'].includes(k.meta_trend) ? k.meta_trend : '';
      const arrow = k.meta_arrow ? `<span class="arrow">${escapeHtml(k.meta_arrow)}</span>` : '';
      const unit = k.unit ? `<sup>${escapeHtml(k.unit)}</sup>` : '';
      const card = document.createElement('div');
      card.className = 'kpi-card';
      card.innerHTML = `
        <div class="kpi-label">${escapeHtml(k.label)}</div>
        <div class="kpi-value ${colorClass}">${escapeHtml(k.value)}${unit}</div>
        <div class="kpi-meta ${trendClass}">${arrow}${escapeHtml(k.meta || '')}</div>
      `;
      grid.appendChild(card);
    });
  }

  function makeLatencyTargetLine(target) {
    return {
      id: 'latencyTargetLine',
      afterDatasetsDraw(chart) {
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const yPos = y.getPixelForValue(target);
        ctx.save();
        ctx.strokeStyle = 'rgba(251, 191, 36, 0.45)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(left, yPos);
        ctx.lineTo(right, yPos);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#FBBF24';
        ctx.font = '500 9px "Geist Mono", ui-monospace, monospace';
        ctx.textAlign = 'right';
        ctx.fillText(`TARGET ${target}s`, right - 4, yPos - 5);
        ctx.restore();
      }
    };
  }

  function renderLatencyChart(latency) {
    document.getElementById('latencyDesc').textContent = latency.section_desc || '';
    document.getElementById('latencyCardTitle').textContent = latency.card_title || '';
    document.getElementById('latencyCardMeta').textContent = latency.card_meta || '';
    const labels = (latency.dates || []).map(d => 'Apr ' + d);
    const target = latency.target || 8;
    const vals = (latency.values || []).filter(v => v > 0);
    const maxVal = vals.length ? Math.max(target, ...vals) : target;
    const minVal = vals.length ? Math.min(target, ...vals) : 0;

    charts.latency = new Chart(document.getElementById('latencyChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Avg latency',
          data: latency.values,
          borderColor: C.mint,
          backgroundColor: 'rgba(52, 211, 153, 0.10)',
          borderWidth: 2,
          pointRadius: (ctx) => ctx.parsed.y > target ? 4 : 3,
          pointBackgroundColor: (ctx) => ctx.parsed.y > target ? C.amber : C.surface,
          pointBorderColor: (ctx) => ctx.parsed.y > target ? C.amber : C.mint,
          pointBorderWidth: 1.5,
          pointHoverRadius: 6,
          tension: 0.35,
          fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#08090C', titleColor: C.text1, bodyColor: C.text2,
            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
            callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + 's avg latency' }
          }
        },
        scales: {
          x: { ticks: { color: C.text3, font: { size: 9 } }, grid: { display: false } },
          y: {
            beginAtZero: false,
            suggestedMin: Math.max(0, minVal - 1),
            suggestedMax: maxVal + 2,
            ticks: { color: C.text3, font: { size: 9 }, callback: v => v + 's', stepSize: 1 },
            grid: { color: C.grid }
          }
        }
      },
      plugins: [makeLatencyTargetLine(target)]
    });
  }

  function renderDailyChart(daily) {
    document.getElementById('dailyDesc').textContent = daily.section_desc || '';
    document.getElementById('dailyCardTitle').textContent = daily.card_title || '';
    const labels = (daily.dates || []).map(d => 'Apr ' + d);

    charts.daily = new Chart(document.getElementById('dailyChart'), {
      data: {
        labels,
        datasets: [
          { type: 'bar', label: 'Traces', data: daily.volume, backgroundColor: 'rgba(245,245,244,0.85)', borderRadius: 3, yAxisID: 'y', order: 2, barPercentage: 0.65 },
          { type: 'line', label: 'Unresolved %', data: daily.fail_pct, borderColor: C.red, backgroundColor: C.red, borderWidth: 2, pointRadius: 3, pointBackgroundColor: C.surface, pointBorderColor: C.red, pointBorderWidth: 1.5, tension: 0.3, yAxisID: 'y1', order: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#08090C', titleColor: C.text1, bodyColor: C.text2, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10 } },
        scales: {
          x: { ticks: { color: C.text3, font: { size: 9 } }, grid: { display: false } },
          y: { position: 'left', beginAtZero: true, ticks: { color: C.text3, font: { size: 9 }, stepSize: 200 }, grid: { color: C.grid, drawTicks: false } },
          y1: { position: 'right', beginAtZero: true, max: 50, grid: { drawOnChartArea: false }, ticks: { color: C.red, font: { size: 9 }, callback: v => v + '%' } }
        }
      }
    });
  }

  function renderTools(toolsObj, daily) {
    document.getElementById('toolsDesc').textContent = toolsObj.section_desc || '';
    const tools = toolsObj.items || [];
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';

    // build cards
    tools.forEach((t, i) => {
      const failColorClass = t.fail >= 50 ? 'red' : t.fail >= 25 ? 'amber' : 'mint';
      const pillKey = t.status === 'crit' ? 'crit' : t.status === 'warn' ? 'warn' : t.status === 'ok' ? 'ok' : 'idle';
      const card = document.createElement('div');
      card.className = `tool-row ${t.status}`;
      card.innerHTML = `
        <div class="tool-info">
          <div class="tool-name">${escapeHtml(t.name)}</div>
          <div class="tool-vol">${Number(t.vol).toLocaleString()} traces · ${t.share}%</div>
        </div>
        <div class="tool-stats">
          <div class="tool-stat"><div class="lbl">Fail</div><div class="val ${failColorClass}">${t.fail}<span style="font-size:13px;">%</span></div></div>
          <div class="tool-stat"><div class="lbl">Avg</div><div class="val text-1">${t.time}<span style="font-size:13px;">s</span></div></div>
        </div>
        <div class="chart-wrap tool-spark"><canvas id="tool-spark-${i}"></canvas></div>
        <div class="tool-pill pill-${pillKey}">${escapeHtml(t.pill)}</div>
      `;
      grid.appendChild(card);
    });

    // build sparklines (after DOM insertion so canvases exist)
    charts.tools = [];
    tools.forEach((t, i) => {
      const sparkColor = t.status === 'crit' ? C.red : t.status === 'warn' ? C.amber : t.status === 'ok' ? C.mint : C.text3;
      const fillColor = t.status === 'crit' ? 'rgba(255, 84, 112, 0.12)' : t.status === 'warn' ? 'rgba(251, 191, 36, 0.10)' : t.status === 'ok' ? 'rgba(52, 211, 153, 0.10)' : 'rgba(255, 255, 255, 0.04)';
      const chart = new Chart(document.getElementById(`tool-spark-${i}`), {
        type: 'line',
        data: { labels: daily.dates, datasets: [{ data: t.daily_fail, borderColor: sparkColor, backgroundColor: fillColor, fill: true, tension: 0.35, pointRadius: 0, borderWidth: 1.5 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
        }
      });
      charts.tools.push(chart);
    });
  }

  function renderIncident(inc, daily) {
    document.getElementById('incidentDesc').textContent = inc.section_desc || '';
    document.getElementById('incidentTag').textContent = inc.tag || '';
    document.getElementById('incidentTitle').innerHTML = inc.title_html || '';

    const statsEl = document.getElementById('incidentStats');
    statsEl.innerHTML = '';
    (inc.stats || []).forEach(s => {
      const colorClass = s.color === 'red' ? 'red' : '';
      const unitHtml = s.unit ? `<span style="font-size:18px;">${escapeHtml(s.unit)}</span>` : '';
      const div = document.createElement('div');
      div.className = 'incident-stat';
      div.innerHTML = `<div class="lbl">${escapeHtml(s.lbl)}</div><div class="val ${colorClass}">${escapeHtml(s.val)}${unitHtml}</div>`;
      statsEl.appendChild(div);
    });

    const highlight = Number.isInteger(inc.highlight_index) ? inc.highlight_index : -1;
    charts.promo = new Chart(document.getElementById('promoChart'), {
      type: 'line',
      data: {
        labels: (daily.dates || []).map(d => 'Apr ' + d),
        datasets: [{
          data: inc.chart_data || [],
          borderColor: C.red, backgroundColor: 'rgba(255, 84, 112, 0.15)', borderWidth: 2,
          pointRadius: (ctx) => ctx.dataIndex === highlight ? 5 : 2.5,
          pointBackgroundColor: (ctx) => ctx.dataIndex === highlight ? C.red : C.surface,
          pointBorderColor: C.red,
          pointBorderWidth: (ctx) => ctx.dataIndex === highlight ? 2 : 1.5,
          fill: true, tension: 0.15
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#08090C', titleColor: C.text1, bodyColor: C.text2, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '% failed' } } },
        scales: {
          x: { ticks: { color: C.text3, font: { size: 9 } }, grid: { display: false } },
          y: { beginAtZero: true, max: 100, ticks: { color: C.text3, font: { size: 9 }, callback: v => v + '%', stepSize: 25 }, grid: { color: C.grid } }
        }
      }
    });
  }

  function renderLanguages(lang) {
    document.getElementById('langCardTitle').textContent = lang.card_title || '';
    document.getElementById('langCardMeta').textContent = lang.card_meta || '';
    const wrap = document.getElementById('langBars');
    wrap.innerHTML = '';
    (lang.rows || []).forEach(d => {
      const row = document.createElement('div');
      row.className = 'lang-bar-row';
      row.innerHTML = `
        <div class="tool-lbl">${escapeHtml(d.tool)}</div>
        <div class="lang-bar-stack">
          <div class="lang-bar"><div class="fill en" style="width:${d.en}%;"></div><div class="pct-label">EN ${Number(d.en).toFixed(0)}%</div></div>
          <div class="lang-bar"><div class="fill th" style="width:${d.th}%;"></div><div class="pct-label">TH ${Number(d.th).toFixed(0)}%</div></div>
        </div>
      `;
      wrap.appendChild(row);
    });
  }

  function renderBrands(brands) {
    document.getElementById('brandsDesc').textContent = brands.section_desc || '';
    document.getElementById('brandsCardTitle').textContent = brands.card_title || '';
    document.getElementById('brandsCardMeta').textContent = brands.card_meta || '';
    const items = brands.items || [];
    charts.brand = new Chart(document.getElementById('brandChart'), {
      type: 'bar',
      data: {
        labels: items.map(i => i.name),
        datasets: [{
          data: items.map(i => i.value),
          backgroundColor: (ctx) => {
            const v = ctx.parsed?.y ?? 0;
            if (v >= 15) return C.red;
            if (v >= 8) return C.amber;
            return 'rgba(245, 245, 244, 0.7)';
          },
          borderRadius: 3, barPercentage: 0.7
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#08090C', titleColor: C.text1, bodyColor: C.text2, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, callbacks: { label: ctx => ctx.parsed.y + ' failed queries' } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: C.text3, font: { size: 9 }, maxRotation: 35, minRotation: 35 } },
          y: { beginAtZero: true, ticks: { color: C.text3, font: { size: 9 }, stepSize: 5 }, grid: { color: C.grid } }
        }
      }
    });
  }

  function renderRecs(recs) {
    document.getElementById('recsDesc').textContent = recs.section_desc || '';
    const grid = document.getElementById('recsGrid');
    grid.innerHTML = '';
    (recs.items || []).forEach(r => {
      const tierClass = ['p0','p1','p2'].includes(r.tier) ? r.tier : 'p2';
      const card = document.createElement('div');
      card.className = 'rec-card';
      card.innerHTML = `
        <div class="rec-num">${escapeHtml(String(r.rank))}</div>
        <div class="rec-tier ${tierClass}">${escapeHtml(r.tier_label || '')}</div>
        <h4>${escapeHtml(r.title || '')}</h4>
        <div class="rec-stats">
          <span class="rec-tag">Effort <strong>${escapeHtml(r.effort || '')}</strong></span>
          <span class="rec-tag">Impact <strong>${escapeHtml(r.impact || '')}</strong></span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function updateLastUpdated() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('lastUpdated').textContent = `LOADED ${hh}:${mm}`;
  }

  // ============================================================
  // CHART CLEANUP
  // ============================================================
  function destroyCharts() {
    if (charts.daily) charts.daily.destroy();
    if (charts.latency) charts.latency.destroy();
    if (charts.promo) charts.promo.destroy();
    if (charts.brand) charts.brand.destroy();
    if (Array.isArray(charts.tools)) charts.tools.forEach(c => c && c.destroy());
    charts = {};
  }

  // ============================================================
  // ESCAPE — for safe HTML insertion of user-editable strings
  // ============================================================
  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[ch]);
  }

  // ============================================================
  // ORCHESTRATION
  // ============================================================
  function render(data) {
    destroyCharts();
    renderMeta(data.meta || {});
    renderStatusBanner(data.status_banner);
    renderKpis(data.kpis || []);
    renderLatencyChart(data.latency || {});
    renderDailyChart(data.daily || {});
    renderTools(data.tools || {}, data.daily || {});
    renderIncident(data.incident || {}, data.daily || {});
    renderLanguages(data.languages || {});
    renderBrands(data.brands || {});
    renderRecs(data.recommendations || {});
    updateLastUpdated();
  }

  async function init(triggeredByButton = false) {
    const btn = document.getElementById('refreshBtn');
    if (triggeredByButton) {
      btn.disabled = true;
      btn.classList.add('spinning');
    }
    try {
      const data = await loadData();
      clearError();
      render(data);
    } catch (err) {
      console.error(err);
      showError(`Failed to load data: ${err.message}. Check that your published-CSV URL is reachable.`);
    } finally {
      document.getElementById('loadingOverlay').classList.add('hide');
      if (triggeredByButton) {
        // brief delay so the spin animation reads as "doing something"
        setTimeout(() => { btn.disabled = false; btn.classList.remove('spinning'); }, 400);
      }
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', () => init(true));
  init(false);
</script>

</body>
</html>
